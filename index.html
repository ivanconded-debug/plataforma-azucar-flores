<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Azúcar Flores | Pastelería Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

        :root {
            --bg-crema: #FDFBF7;
            --chocolate: #1A1817;
            --oro: #C5A059;
            --rosa: #C8819E;
            --metal-gold: linear-gradient(135deg, #A67C00 0%, #F5D061 25%, #C5A059 50%, #FDF6CE 75%, #8B6914 100%);
            --metal-pink: linear-gradient(135deg, #A65879 0%, #EAAFC8 25%, #C8819E 50%, #F8DAE5 75%, #8A405D 100%);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lato', sans-serif; }
        
        /* Fondo por defecto oscuro para evitar parpadeos o espacios blancos en el login */
        body { background-color: #0C0B0A; color: #2A2522; overflow-x: hidden; transition: background-color 0.5s ease; }
        body.logged-in { background-color: var(--bg-crema); }
        
        h1, h2, h3, .playfair { font-family: 'Playfair Display', serif; letter-spacing: 0.5px; }

        .metal-text-gold { background: var(--metal-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: var(--oro); }
        .metal-text-pink { background: var(--metal-pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: var(--rosa); }

        /* ==================================================================
           BOTÓN UNIVERSAL (Acciones principales: Compartir, Backups)
           ================================================================== */
        .btn-universal {
            width: 100%; padding: 0.8rem 1rem; cursor: pointer; color: #111 !important; 
            border-radius: 1rem; border: none; outline: none;
            background: var(--metal-pink); margin-bottom: 0.6rem;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1.5px; transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(200, 129, 158, 0.2);
        }
        .btn-universal:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(200, 129, 158, 0.35); }
        .btn-universal:active { background: var(--metal-gold); box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3); }

        /* ==================================================================
           BOTÓN MODULAR REDUCIDO (Secciones del Índice - Mitad de tamaño)
           ================================================================== */
        .btn-module {
            width: 100%; padding: 0.4rem 0.8rem; cursor: pointer; color: #111 !important; 
            border-radius: 0.6rem; border: none; outline: none;
            background: var(--metal-pink); margin-bottom: 0.4rem;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.6rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(200, 129, 158, 0.2);
        }
        .btn-module:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(200, 129, 158, 0.35); }
        .btn-module.active, .btn-module:active { background: var(--metal-gold); box-shadow: 0 4px 10px rgba(197, 160, 89, 0.3); }
        .btn-module .btn-delete-mod { color: #8A405D; font-size: 0.8rem; background: rgba(255,255,255,0.3); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-module .btn-delete-mod:hover { background: #8A405D; color: white; transform: scale(1.1); }

        /* Cinta de Banner Reducida */
        .banner-area { position: relative; width: 100%; height: 160px; background-color: var(--bg-crema); border-bottom: 4px solid var(--oro); overflow: hidden; }
        @media(min-width: 768px) { .banner-area { height: 200px; } }
        .carousel-track { display: flex; height: 100%; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .carousel-slide { min-width: 100%; height: 100%; position: relative; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .slide-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 0 8%; background: linear-gradient(to right, rgba(26,24,23,0.85), rgba(26,24,23,0.3)); }

        /* Bloques de Contenido Premium */
        .content-block { 
            position: relative; border-radius: 30px; transition: 0.4s; background: #FFFFFF;
            border: 1px solid rgba(197, 160, 89, 0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            margin-bottom: 2.5rem; overflow: hidden;
        }
        .content-block::after {
            content: ""; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px dashed rgba(197, 160, 89, 0.2); border-radius: 20px; pointer-events: none;
        }

        .btn-wa-premium { 
            width: 100% !important; display: flex !important; align-items: center !important; justify-content: center !important;
            padding: 1.2rem !important; color: #111 !important; border: none !important; border-radius: 18px !important;
            font-size: 1rem !important; font-weight: 900 !important; cursor: pointer !important; transition: 0.3s !important;
            background: var(--metal-pink) !important; box-shadow: 0 10px 25px rgba(200, 129, 158, 0.4) !important;
            text-decoration: none !important; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-wa-premium:hover { background: var(--metal-gold) !important; transform: translateY(-4px) !important; box-shadow: 0 15px 35px rgba(197, 160, 89, 0.5) !important; }

        /* Insumos UI */
        .table-insumos { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        .table-insumos th { border-bottom: 2px solid var(--oro); padding: 0.8rem; color: var(--oro); text-align: left; font-size: 0.75rem; text-transform: uppercase; }
        .table-insumos td { padding: 0.8rem; border-bottom: 1px solid #f8f8f8; }
        .input-insumo { background: transparent; border: none; border-bottom: 1px solid #eee; padding: 4px; outline: none; width: 100%; font-size: 0.9rem; transition: 0.3s;}
        .input-insumo:focus { border-color: var(--rosa); background: rgba(200, 129, 158, 0.05); }

        /* Animación de 3 Velas */
        @keyframes flicker { 0% { opacity: 0.8; transform: scale(1) rotate(-1deg); } 50% { opacity: 1; transform: scale(1.1) rotate(1deg); } 100% { opacity: 0.9; transform: scale(0.95) rotate(-2deg); } }
        .flame { animation: flicker 1.2s infinite alternate; transform-origin: center bottom; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--oro); border-radius: 10px; }
        
        /* Sistema Maestro de Admin */
        body.admin-mode-active .admin-only { display: flex !important; }
        .admin-only { display: none !important; }

        #toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--chocolate); color: #fff; padding: 15px 30px; border-radius: 50px; font-size: 0.9rem; font-weight: bold; border: 1px solid var(--oro); z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mod-title-edit { outline: none; background: transparent; color: inherit; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>

            document.querySelectorAll('.module-content-view').forEach(m => m.style.display = 'none');

            if(t==='texto') {

        window.pedirWA = (btn) => {

        window.guardarCodigo = () => { const d = { mc: document.getElementById('modules-container').innerHTML, ml: document.getElementById('module-list').innerHTML, ct: document.getElementById('carousel-track').innerHTML, rec: window.pasteleriaRecetas }; const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:"application/json"})); a.download = "AzucarFlores_Respaldo_Final.json"; a.click(); };
        window.cargarRespaldo = (e) => { const f = e.target.files[0]; const r = new FileReader(); r.onload = (ev) => { const d = JSON.parse(ev.target.result); document.getElementById('modules-container').innerHTML = d.mc || d.modulesContainer; document.getElementById('module-list').innerHTML = d.ml || d.moduleList; document.getElementById('carousel-track').innerHTML = d.ct || d.carouselTrack; if(d.rec) window.pasteleriaRecetas = d.rec; window.cambiarModulo(window.currentModuleId,true); window.renderPlantillaInsumos(); window.showToast("Catálogo Restaurado Exitosamente"); }; r.readAsText(f); };

        // --- GESTIÓN DE BANNERS CONTINUOS ---
        window.actualizarVistaCarrusel = function() {
            const dots = document.getElementById('carousel-dots');
            if(!dots) return;
            dots.innerHTML = '';
            const track = document.getElementById('carousel-track');
            if(!track) return;
            for(let i=0; i<track.children.length; i++) {
                const d = document.createElement('div');
                d.className = `dot ${i === window.slideActual ? 'active' : ''}`;
                d.onclick = () => { 
                    window.slideActual = i; 
                    track.style.transform = `translateX(-${i * 100}%)`; 
                    window.actualizarVistaCarrusel(); 
                    window.triggerAutoSave();
                };
                dots.appendChild(d);
            }
        };

            window.actualizarVistaCarrusel();
            if(window.intervaloCarrusel) clearInterval(window.intervaloCarrusel);
            window.intervaloCarrusel = setInterval(() => {
                const track = document.getElementById('carousel-track');
                const total = track?.children.length || 0;
                if(total > 1) { 
                    window.slideActual = (window.slideActual + 1) % total; 
                    track.style.transform = `translateX(-${window.slideActual * 100}%)`; 
                    window.actualizarVistaCarrusel();
                }
            }, 6000);
        };

        window.agregarBannerCarrusel = function() {
            const track = document.getElementById('carousel-track');
            const div = document.createElement('div'); div.className = "carousel-slide min-w-full h-full relative flex items-center justify-center group";
            div.innerHTML = `
                <input type="text" class="admin-only absolute top-4 left-4 w-1/2 p-3 z-30 text-black text-xs rounded-xl shadow-lg border-2 border-[var(--oro)]" placeholder="Pega URL de imagen aquí..." onchange="this.nextElementSibling.src=this.value; window.triggerAutoSave();">
                <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=1200" class="w-full h-full object-cover opacity-60">
                <div class="slide-overlay"><h2 class="playfair metal-text-gold text-4xl mb-2" contenteditable="true" onblur="window.triggerAutoSave()">Nuevo Banner</h2><p class="text-slate-100 font-bold text-lg" contenteditable="true" onblur="window.triggerAutoSave()">Descripción.</p></div>`;
            track.appendChild(div); 
            window.actualizarVistaCarrusel();
            window.toggleEditables(window.isAdmin && !window.isViewingAsClient);
            window.triggerAutoSave();
        };

        window.eliminarBannerActual = function() {
            const track = document.getElementById('carousel-track');
            if(track.children.length > 1) { track.children[window.slideActual].remove(); window.slideActual = 0; track.style.transform = "translateX(0)"; window.actualizarVistaCarrusel(); window.triggerAutoSave(); }
            else { alert("Debe quedar al menos 1 banner."); }
        };

        // --- FIREBASE (NUBE) ---
        let autoSaveTimer;
        window.triggerAutoSave = () => {
            if(!window.isAdmin || window.isViewingAsClient) return;
            const ind = document.getElementById('cloud-indicator'); ind.style.display = 'flex';
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                const d = { mc: document.getElementById('modules-container').innerHTML, ml: document.getElementById('module-list').innerHTML, ct: document.getElementById('carousel-track').innerHTML, rec: window.pasteleriaRecetas, updatedAt: new Date().toISOString() };
                if(db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'catalogo', 'main'), d);
                setTimeout(() => ind.style.display = 'none', 1500);
            }, 2500);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const firebaseConfig = { 
                apiKey: "AIzaSyBJL1LxhTQLN1tiukW8eydErw3RssaegAA", 
                authDomain: "azucar-flores.firebaseapp.com", 
                projectId: "azucar-flores", 
                storageBucket: "azucar-flores.firebasestorage.app", 
                messagingSenderId: "449617416475", 
                appId: "1:449617416475:web:bcd0c04a4bf6c15afb83be" 
            };
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app); auth = getAuth(app); appId = "azucar-flores-produccion";
            
            try {
                await signInAnonymously(auth);
                
                // Recuperar datos al cargar para mantener todo sincronizado en la nube
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'catalogo', 'main'), (snap) => {
                    if(snap.exists()) {
                        const d = snap.data();
                        // Solo actualizamos la vista si acabamos de cargar la página o estamos en modo cliente
                        if(!window.isAdmin || window.isViewingAsClient) {
                            if(d.mc) document.getElementById('modules-container').innerHTML = d.mc;
                            if(d.ml) document.getElementById('module-list').innerHTML = d.ml;
                            if(d.ct) document.getElementById('carousel-track').innerHTML = d.ct;
                            if(d.rec) window.pasteleriaRecetas = d.rec;
                            window.renderPlantillaInsumos();
                            window.actualizarVistaCarrusel();
                        }
                    }
                });
            } catch(e) {
                console.error("Firebase Auth Error:", e);
                if(e.code === 'auth/configuration-not-found') {
                    // Si el inicio de sesión anónimo no está habilitado, avisamos amigablemente.
                    setTimeout(() => window.showToast("⚠️ Falta habilitar el acceso 'Anónimo' en la consola de Firebase."), 2000);
                }
            }
        });
    </script>
</body>
</html>
