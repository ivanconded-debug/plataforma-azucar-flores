        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

        :root {
            --bg-main: #FDFBF7;
            --sidebar-bg: #1A1817;
            --solid-gold: #C5A059;
            --solid-pink: #C8819E;
            --metal-gold: linear-gradient(135deg, #A67C00 0%, #F5D061 25%, #C5A059 50%, #FDF6CE 75%, #8B6914 100%);
            --metal-pink: linear-gradient(135deg, #A65879 0%, #EAAFC8 25%, #C8819E 50%, #F8DAE5 75%, #8A405D 100%);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lato', sans-serif; }
        body { background-color: var(--bg-main); color: #2A2522; overflow-x: hidden; }
        h1, h2, h3, .playfair { font-family: 'Playfair Display', serif; letter-spacing: 0.5px; }

        .metal-text-gold { background: var(--metal-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: var(--solid-gold); }
        .metal-text-pink { background: var(--metal-pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: var(--solid-pink); }

        /* Sidebar Styling */
        #module-list li {
            padding: 0.85rem 1.2rem; cursor: pointer; color: #E8E0DD; font-size: 0.95rem; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center; border-radius: 0.75rem;
            margin-bottom: 0.5rem; transition: all 0.3s ease; border: 1px solid transparent;
        }
        #module-list li:hover { background-color: #2B2624; color: #fff; }
        #module-list li.active { background: var(--metal-pink); color: #111; box-shadow: 0 4px 15px rgba(200, 129, 158, 0.4); border-color: transparent; }

        .mod-title-edit { flex-grow: 1; outline: none; background-color: transparent !important; color: inherit; padding: 2px 5px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Bloques de Contenido */
        .content-block { 
            position: relative; border-radius: 24px; transition: 0.3s; background: #FFFFFF;
            border: 1px solid rgba(197, 160, 89, 0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            margin-bottom: 2rem; overflow: hidden;
        }
        .block-controls { position: absolute; top: 15px; right: 15px; background: var(--sidebar-bg); border: 1px solid var(--solid-gold); border-radius: 10px; padding: 6px; display: none; gap: 6px; z-index: 30; }
        
        /* Botón WhatsApp Reforzado */
        .btn-wa-premium { 
            width: 100% !important; display: flex !important; align-items: center !important; justify-content: center !important;
            padding: 1.2rem !important; color: #111 !important; border: none !important; border-radius: 14px !important;
            font-size: 1.1rem !important; font-weight: 900 !important; cursor: pointer !important; transition: all 0.3s !important;
            background: var(--metal-pink) !important; box-shadow: 0 8px 25px rgba(200, 129, 158, 0.4) !important;
            text-decoration: none !important; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-wa-premium:hover { background: var(--metal-gold) !important; transform: translateY(-3px) !important; }

        /* Carrusel */
        .banner-area { position: relative; width: 100%; height: 260px; background-color: var(--sidebar-bg); border-bottom: 4px solid var(--solid-gold); border-image: var(--metal-gold) 1; overflow: hidden; }
        @media(min-width: 768px) { .banner-area { height: 420px; } }
        .carousel-track { display: flex; height: 100%; transition: transform 0.7s cubic-bezier(0.2, 1, 0.3, 1); }
        .carousel-slide { min-width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .slide-overlay { position: absolute; bottom: 25px; left: 15px; right: 15px; background: rgba(26, 24, 23, 0.88); padding: 1.2rem; border-radius: 18px; border-left: 6px solid var(--solid-pink); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        @media(min-width: 768px) { .slide-overlay { bottom: 50px; left: 60px; max-width: 600px; padding: 2rem; } }

        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 1px solid var(--solid-gold); cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--metal-pink); transform: scale(1.4); border-color: transparent; }

        .brand-logo-svg { width: 100%; max-width: 240px; filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.5)); }
        
        body.admin-mode .admin-only { display: flex !important; }
        body.admin-mode .content-block:hover .block-controls { display: flex; }
        .admin-only { display: none !important; }

        #toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--sidebar-bg); color: #fff; padding: 12px 25px; border-radius: 50px; font-weight: bold; border: 1px solid var(--solid-gold); z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #C5A059; border-radius: 10px; }

        /* Estilo Insumos */
        .insumos-panel { background: #FFFFFF; border-radius: 16px; border: 1px solid rgba(197, 160, 89, 0.2); padding: 1.5rem; margin-bottom: 1.5rem; }
        .recipe-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; }
        .input-inline { padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 6px; width: 100px; outline: none; }
    </style>
</head>

        window.validarAcceso = function() {
            const pin = document.getElementById('pin-input').value;
            if (pin === ADMIN_PIN) { window.isAdmin = true; window.isViewingAsClient = false; document.body.classList.add('admin-mode'); window.entrar(); }

        };

        window.entrar = function() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-layout').classList.remove('hidden');
            window.toggleEditables(window.isAdmin && !window.isViewingAsClient);
            window.cambiarModulo(window.currentModuleId, true);
            window.inicializarCarrusel();
            window.showToast(window.isAdmin ? "Administrador Activo" : "Bienvenido");
        };

        window.toggleAdminView = function() {
            window.isViewingAsClient = !window.isViewingAsClient;
            const btn = document.getElementById('btn-admin-view');
            btn.innerText = window.isViewingAsClient ? "Volver a Editar" : "Ver Resultado";
            window.toggleEditables(!window.isViewingAsClient);
        };

        window.toggleEditables = function(state) {
            document.querySelectorAll('[contenteditable]').forEach(el => el.setAttribute('contenteditable', state));
            document.querySelectorAll('.admin-only').forEach(el => {
                if(window.isAdmin && !window.isViewingAsClient) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        };

        window.cambiarModulo = function(id, skipMenu = false) {
            window.currentModuleId = id;
            document.querySelectorAll('#module-list li').forEach(li => li.classList.remove('active'));
            const activeLi = document.getElementById('nav-' + id);
            if(activeLi) {
                activeLi.classList.add('active');
                document.getElementById('breadcrumb-active').innerText = activeLi.innerText.toUpperCase();
            }
            document.querySelectorAll('.module-content-view').forEach(m => m.style.display = 'none');
            if(document.getElementById(id)) document.getElementById(id).style.display = 'block';
            if(!skipMenu && window.innerWidth < 1024) window.toggleSidebar(false);
        };

        window.toggleSidebar = function(state) {
            const side = document.getElementById('sidebar');
            const over = document.getElementById('mobile-overlay');
            if(state) { side.classList.remove('-translate-x-full'); over.classList.remove('hidden'); }
            else { side.classList.add('-translate-x-full'); over.classList.add('hidden'); }
        };

        window.agregarBloque = function(tipo) {
            const wrapper = document.querySelector(`#${window.currentModuleId} .blocks-wrapper`);
            if(!wrapper) return;
            const block = document.createElement('div');
            block.className = 'content-block';
            let html = `<div class="block-controls admin-only"><button class="text-white" onclick="window.moverBloque(this, -1)">⬆️</button><button class="text-white" onclick="window.moverBloque(this, 1)">⬇️</button><button class="text-red-400 font-bold" onclick="this.closest('.content-block').remove(); window.triggerAutoSave();">X</button></div>`;
            if(tipo==='texto') html += `<div class="p-8 text-content" contenteditable="true">Haz clic para editar texto...</div>`;
            else if(tipo==='imagen') { const url = prompt("URL de la foto:"); if(!url) return; html += `<img src="${url}" class="w-full h-auto">`; }
            else if(tipo==='whatsapp') {
                html += `<div class="p-8 wa-product-block">
                    <h2 class="wa-prod-name metal-text-pink text-3xl font-black mb-2" contenteditable="true">Nuevo Pastel</h2>
                    <p class="wa-prod-desc text-slate-500 mb-6" contenteditable="true">Descripción del pastel.</p>
                    <div class="flex items-center justify-between gap-4">
                        <span class="wa-prod-price text-2xl font-black metal-text-gold" contenteditable="true">$0.00</span>
                        <button class="btn-wa-premium flex-1" onclick="window.pedirWhatsApp(this)">Pedir por WhatsApp</button>
                    </div>
                </div>`;
            }
            block.innerHTML = html;
            wrapper.appendChild(block);
            window.triggerAutoSave();
        };

        window.pedirWhatsApp = function(btn) {
            const card = btn.closest('.wa-product-block') || btn.closest('.content-block');
            const nombre = card.querySelector('.wa-prod-name').innerText;
            const precio = card.querySelector('.wa-prod-price').innerText;
            const msg = `¡Hola Azúcar Flores! 🌸 Me interesa pedir: *${nombre}* (${precio}). ¿Me dan informes?`;
            window.open(`https://wa.me/5213311414110?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.moverBloque = function(btn, dir) {
            const block = btn.closest('.content-block');
            if(dir === -1 && block.previousElementSibling) block.parentElement.insertBefore(block, block.previousElementSibling);
            else if(dir === 1 && block.nextElementSibling) block.parentElement.insertBefore(block.nextElementSibling, block);
            window.triggerAutoSave();
        };

        window.inicializarCarrusel = function() {
            const track = document.getElementById('carousel-track');
            if(track.children.length === 0) track.innerHTML = initialBackup.carouselTrack;
            window.actualizarVistaCarrusel();
            if(window.intervaloCarrusel) clearInterval(window.intervaloCarrusel);
            window.intervaloCarrusel = setInterval(() => window.moverCarrusel(1), 6000);
        };

        window.moverCarrusel = function(dir) {
            const track = document.getElementById('carousel-track');
            const total = track.children.length;
            if(total === 0) return;
            window.slideActual = (window.slideActual + dir + total) % total;
            track.style.transform = `translateX(-${window.slideActual * 100}%)`;
            window.actualizarVistaCarrusel();
        };

        window.actualizarVistaCarrusel = function() {
            const dots = document.getElementById('carousel-dots');
            dots.innerHTML = '';
            for(let i=0; i<document.getElementById('carousel-track').children.length; i++) {
                const d = document.createElement('div');
                d.className = `dot ${i === window.slideActual ? 'active' : ''}`;
                dots.appendChild(d);
            }
        };

        async function initFirebase() {
            try {
                // USAMOS TUS LLAVES FIREBASE (AZUCAR FLORES)
                const firebaseConfig = {
                    apiKey: "AIzaSyArmyn37sfNsY93oQU2F1c9imOxizt_gjk",
                    authDomain: "manual-vemsi.firebaseapp.com",
                    projectId: "manual-vemsi",
                    storageBucket: "manual-vemsi.firebasestorage.app",
                    messagingSenderId: "782991816702",
                    appId: "1:782991816702:web:65656fee4b385bd0d232af"
                };

                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                appId = "azucar-flores-web-oficial";

                await signInAnonymously(auth);
                
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'catalogo', 'main'), (snap) => {
                    if(snap.exists() && !window.isAdmin) {
                        const data = snap.data();
                        document.getElementById('modules-container').innerHTML = data.modulesContainer;
                        document.getElementById('module-list').innerHTML = data.moduleList;
                        document.getElementById('carousel-track').innerHTML = data.carouselTrack;
                        window.cambiarModulo(window.currentModuleId, true);
                        window.actualizarVistaCarrusel();
                    }
                });
            } catch (e) {
                document.getElementById('modules-container').innerHTML = initialBackup.modulesContainer;
                document.getElementById('module-list').innerHTML = initialBackup.moduleList;
                window.cambiarModulo(window.currentModuleId, true);
            }
        }

        let autoSaveTimer;
        window.triggerAutoSave = function() {
            if(!window.isAdmin || window.isViewingAsClient) return;
            const ind = document.getElementById('cloud-indicator');
            ind.innerHTML = "GUARDANDO...";
            ind.classList.remove('hidden');
            
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                const data = {
                    modulesContainer: document.getElementById('modules-container').innerHTML,
                    moduleList: document.getElementById('module-list').innerHTML,
                    carouselTrack: document.getElementById('carousel-track').innerHTML,
                    updatedAt: new Date().toISOString()
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'catalogo', 'main'), data);
                ind.innerHTML = "NUBE ACTIVA";
                setTimeout(() => ind.classList.add('hidden'), 2000);
            }, 2000);
        };

        document.addEventListener('input', () => window.triggerAutoSave());
        window.showToast = function(m) { const t = document.getElementById('toast-msg'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 3000); };
        window.copiarLink = function() { const url = "https://plataforma-azucar-flores.vercel.app/"; const i = document.createElement('input'); i.value = url; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i); window.showToast("Enlace copiado"); };
        window.cerrarSesion = function() { location.reload(); };

        initFirebase();
    </script>
</body>
</html>
